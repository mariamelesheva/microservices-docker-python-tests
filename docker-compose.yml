version: '3'

services:
  articles-management:
    container_name: articles-management
    build:
      context: ./services/articles-management
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_URI=mongodb://mongodb:27017/articles_db?ssl=false
      - PORT=3000
      - MESSAGE_BUS=amqp://rabbitmq
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  events-management:
    container_name: events-management
    build:
      context: ./services/events-management
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DB_URI=mongodb://mongodb:27017/events_db?ssl=false
      - PORT=3000
      - MESSAGE_BUS=amqp://rabbitmq
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  user-management:
    container_name: user-management
    build:
      context: ./services/user-management
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - DB_URI=mongodb://mongodb:27017/users_db?ssl=false
      - PORT=3000
      - MESSAGE_BUS=amqp://rabbitmq
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  authentication:
    container_name: authentication
    build:
      context: ./services/authentication
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    environment:
      - DB_URI=mongodb://mongodb:27017/auth_db
      - DB_URI=mongodb://mongodb:27017/auth_db?ssl=false
      - PORT=3000
      - MESSAGE_BUS=amqp://rabbitmq
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  notification:
    container_name: notification
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    environment:
      - MESSAGE_BUS=amqp://rabbitmq
      - EMAIL_SERVICE=gmail
      - EMAIL_ID=noreply.localnewsapplication@gmail.com
      - EMAIL_PASSWORD=Testing0*
      - ADMIN_EMAIL=localnewsapp340ct@gmail.com
    depends_on:
      rabbitmq:
        condition: service_started

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.7.4-management
    ports:
      - "5672:5672"      # ← ДОБАВИТЬ ЭТО (AMQP порт)
      - "15672:15672"    # ← Уже есть (веб-интерфейс)

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: